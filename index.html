<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Apple Pen Reader</title>
  <style>
    :root {
      color-scheme: light;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fb;
      color: #182033;
    }

    body {
      margin: 0;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem clamp(1rem, 4vw, 2rem);
      background: #ffffff;
      border-bottom: 1px solid #d9deea;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    h1 {
      font-size: clamp(1.25rem, 3vw, 1.75rem);
      margin: 0;
    }

    .app-title {
      display: flex;
      flex-direction: column;
      gap: .25rem;
    }

    .version-badge {
      align-self: flex-start;
      border-radius: 999px;
      background: #e7eefb;
      color: #0b3c7d;
      font-size: .85rem;
      font-weight: 700;
      letter-spacing: .04em;
      padding: .2rem .55rem;
    }

    main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(18rem, 24rem);
      gap: 1rem;
      padding: 1rem clamp(1rem, 4vw, 2rem) 2rem;
    }

    .toolbar,
    .result-panel {
      display: flex;
      flex-direction: column;
      gap: .75rem;
    }

    .toolbar-row {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
    }

    button,
    input::file-selector-button {
      border: 0;
      border-radius: .75rem;
      background: #0b63ce;
      color: #ffffff;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      padding: .75rem 1rem;
    }

    button.secondary {
      background: #e7eefb;
      color: #0b3c7d;
    }

    button:disabled {
      background: #c5cad5;
      cursor: not-allowed;
    }

    .viewer-shell,
    .result-panel {
      background: #ffffff;
      border: 1px solid #d9deea;
      border-radius: 1rem;
      box-shadow: 0 12px 32px rgb(29 45 73 / 10%);
    }

    .viewer-shell {
      min-height: 72vh;
      overflow: auto;
      padding: 1rem;
    }

    .page-stage {
      position: relative;
      width: fit-content;
      margin: 0 auto;
      touch-action: pinch-zoom;
    }

    canvas {
      display: block;
      max-width: 100%;
      height: auto;
    }

    #drawCanvas {
      inset: 0;
      position: absolute;
    }

    .placeholder {
      display: grid;
      min-height: 60vh;
      place-items: center;
      text-align: center;
      color: #5d677a;
    }

    .result-panel {
      padding: 1rem;
      position: sticky;
      top: 5.5rem;
      align-self: start;
    }

    #result {
      min-height: 12rem;
      white-space: pre-wrap;
      line-height: 1.65;
      border-radius: .75rem;
      background: #f5f7fb;
      padding: 1rem;
    }

    .hint {
      color: #5d677a;
      font-size: .95rem;
      line-height: 1.6;
      margin: 0;
    }

    @media (max-width: 860px) {
      main {
        grid-template-columns: 1fr;
      }

      .result-panel {
        position: static;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="app-title">
      <span class="version-badge" aria-label="バージョン">V001</span>
      <h1>Apple Pen Reader</h1>
    </div>
    <div class="toolbar-row">
      <input id="pdfInput" type="file" accept="application/pdf">
      <button id="extractButton" disabled>囲み文字を抽出</button>
      <button id="clearButton" class="secondary" disabled>線を消す</button>
    </div>
  </header>

  <main>
    <section class="viewer-shell" aria-label="PDF表示領域">
      <div id="placeholder" class="placeholder">
        <div>
          <h2>PDFを選択してください</h2>
          <p class="hint">PDFを開いて、Apple Pencil・タッチ・マウスで文字を囲んでください。</p>
        </div>
      </div>
      <div id="stage" class="page-stage" hidden>
        <canvas id="pdfCanvas"></canvas>
        <canvas id="drawCanvas"></canvas>
      </div>
    </section>

    <aside class="result-panel">
      <div>
        <h2>抽出結果</h2>
        <p class="hint">現在は表示中の1ページから、囲み線の内側に中心点が入った文字を抽出します。</p>
      </div>
      <output id="result">まだ抽出されていません。</output>
    </aside>
  </main>

  <script type="module">
    import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.min.mjs';

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.worker.min.mjs';

    const pdfInput = document.querySelector('#pdfInput');
    const extractButton = document.querySelector('#extractButton');
    const clearButton = document.querySelector('#clearButton');
    const placeholder = document.querySelector('#placeholder');
    const stage = document.querySelector('#stage');
    const pdfCanvas = document.querySelector('#pdfCanvas');
    const drawCanvas = document.querySelector('#drawCanvas');
    const result = document.querySelector('#result');
    const pdfContext = pdfCanvas.getContext('2d');
    const drawContext = drawCanvas.getContext('2d');

    let currentPage = null;
    let currentViewport = null;
    let textItems = [];
    let outlinePoints = [];
    let outlineBeforeDrawing = [];
    let activePointers = new Map();
    let drawingPointerId = null;
    let pendingTouchPointerId = null;
    let pendingTouchStartPoint = null;
    let isDrawing = false;
    let isGestureInProgress = false;

    const touchDrawStartDistance = 8;

    pdfInput.addEventListener('change', async (event) => {
      const [file] = event.target.files;
      if (!file) return;

      const data = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data }).promise;
      currentPage = await pdf.getPage(1);
      currentViewport = currentPage.getViewport({ scale: bestScaleForScreen(currentPage) });
      await renderPage();
      await cacheTextItems();
      clearDrawing();
      placeholder.hidden = true;
      stage.hidden = false;
      extractButton.disabled = false;
      clearButton.disabled = false;
      result.value = 'まだ抽出されていません。';
      result.textContent = result.value;
    });

    clearButton.addEventListener('click', clearDrawing);
    extractButton.addEventListener('click', () => {
      const extracted = extractTextInsideOutline();
      result.value = extracted || '囲み内のテキストを抽出できませんでした。';
      result.textContent = result.value;
    });

    drawCanvas.addEventListener('pointerdown', (event) => {
      if (!currentPage) return;

      activePointers.set(event.pointerId, event.pointerType);
      if (activePointers.size > 1) {
        cancelDrawingForGesture();
        isGestureInProgress = true;
        return;
      }

      if (isGestureInProgress) return;

      if (event.pointerType === 'touch') {
        pendingTouchPointerId = event.pointerId;
        pendingTouchStartPoint = eventPoint(event);
        return;
      }

      startDrawing(event.pointerId, eventPoint(event));
    });

    drawCanvas.addEventListener('pointermove', (event) => {
      if (activePointers.size > 1 || isGestureInProgress) return;

      const point = eventPoint(event);
      if (event.pointerId === pendingTouchPointerId && !isDrawing) {
        if (distanceBetween(point, pendingTouchStartPoint) < touchDrawStartDistance) return;
        startDrawing(event.pointerId, pendingTouchStartPoint);
      }

      if (!isDrawing || event.pointerId !== drawingPointerId) return;
      outlinePoints.push(point);
      drawContext.lineTo(point.x, point.y);
      drawContext.stroke();
    });

    drawCanvas.addEventListener('pointerup', finishDrawing);
    drawCanvas.addEventListener('pointercancel', finishDrawing);
    drawCanvas.addEventListener('pointerleave', (event) => {
      if (event.pointerId === drawingPointerId && event.buttons === 0) finishDrawing(event);
    });

    function bestScaleForScreen(page) {
      const unscaled = page.getViewport({ scale: 1 });
      const availableWidth = Math.min(window.innerWidth - 48, 980);
      return Math.max(0.75, Math.min(1.75, availableWidth / unscaled.width));
    }

    async function renderPage() {
      const { width, height } = currentViewport;
      [pdfCanvas, drawCanvas].forEach((canvas) => {
        canvas.width = width;
        canvas.height = height;
        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;
      });

      drawContext.strokeStyle = '#0b63ce';
      drawContext.lineWidth = 6;
      drawContext.lineCap = 'round';
      drawContext.lineJoin = 'round';

      await currentPage.render({ canvasContext: pdfContext, viewport: currentViewport }).promise;
    }

    async function cacheTextItems() {
      const textContent = await currentPage.getTextContent();
      textItems = textContent.items.map((item) => {
        const transform = pdfjsLib.Util.transform(currentViewport.transform, item.transform);
        const x = transform[4];
        const y = transform[5];
        return {
          text: item.str,
          center: {
            x: x + item.width * currentViewport.scale / 2,
            y: y - item.height * currentViewport.scale / 2,
          },
        };
      }).filter((item) => item.text.trim().length > 0);
    }

    function eventPoint(event) {
      const rect = drawCanvas.getBoundingClientRect();
      const scaleX = drawCanvas.width / rect.width;
      const scaleY = drawCanvas.height / rect.height;
      return {
        x: (event.clientX - rect.left) * scaleX,
        y: (event.clientY - rect.top) * scaleY,
      };
    }

    function startDrawing(pointerId, point) {
      isDrawing = true;
      drawingPointerId = pointerId;
      pendingTouchPointerId = null;
      pendingTouchStartPoint = null;
      outlineBeforeDrawing = [...outlinePoints];
      outlinePoints = [point];
      drawCanvas.setPointerCapture(pointerId);
      drawContext.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
      drawContext.beginPath();
      drawContext.moveTo(point.x, point.y);
    }

    function finishDrawing(event) {
      activePointers.delete(event.pointerId);
      if (activePointers.size === 0) isGestureInProgress = false;

      if (event.pointerId === pendingTouchPointerId) {
        pendingTouchPointerId = null;
        pendingTouchStartPoint = null;
        return;
      }

      if (!isDrawing || event.pointerId !== drawingPointerId) return;

      isDrawing = false;
      drawingPointerId = null;
      if (drawCanvas.hasPointerCapture(event.pointerId)) {
        drawCanvas.releasePointerCapture(event.pointerId);
      }
      if (outlinePoints.length > 2) {
        drawContext.closePath();
        drawContext.stroke();
      }
    }

    function cancelDrawingForGesture() {
      const capturedPointerId = drawingPointerId;
      pendingTouchPointerId = null;
      pendingTouchStartPoint = null;
      if (!isDrawing) return;

      isDrawing = false;
      drawingPointerId = null;
      outlinePoints = [...outlineBeforeDrawing];
      if (capturedPointerId !== null && drawCanvas.hasPointerCapture(capturedPointerId)) {
        drawCanvas.releasePointerCapture(capturedPointerId);
      }
      redrawOutline();
    }

    function distanceBetween(pointA, pointB) {
      return Math.hypot(pointA.x - pointB.x, pointA.y - pointB.y);
    }

    function redrawOutline() {
      drawContext.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
      if (outlinePoints.length === 0) return;

      drawContext.beginPath();
      drawContext.moveTo(outlinePoints[0].x, outlinePoints[0].y);
      outlinePoints.slice(1).forEach((point) => {
        drawContext.lineTo(point.x, point.y);
      });
      if (outlinePoints.length > 2) drawContext.closePath();
      drawContext.stroke();
    }

    function clearDrawing() {
      outlinePoints = [];
      outlineBeforeDrawing = [];
      activePointers.clear();
      drawingPointerId = null;
      pendingTouchPointerId = null;
      pendingTouchStartPoint = null;
      isDrawing = false;
      isGestureInProgress = false;
      drawContext.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
      result.value = 'まだ抽出されていません。';
      result.textContent = result.value;
    }

    function extractTextInsideOutline() {
      if (outlinePoints.length < 3) return '';
      return textItems
        .filter((item) => isPointInsidePolygon(item.center, outlinePoints))
        .map((item) => item.text)
        .join(' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function isPointInsidePolygon(point, polygon) {
      let inside = false;
      for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
        const xi = polygon[i].x;
        const yi = polygon[i].y;
        const xj = polygon[j].x;
        const yj = polygon[j].y;
        const intersects = ((yi > point.y) !== (yj > point.y))
          && (point.x < ((xj - xi) * (point.y - yi)) / (yj - yi) + xi);
        if (intersects) inside = !inside;
      }
      return inside;
    }
  </script>
</body>
</html>
